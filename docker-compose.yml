version: '2'
services:
  app:
    image: student-attendance-tracker:latest
    networks:
      - attendance-network
    depends_on:
      - mongodb
    ports:
      - "8080:8080"
    environment:
      - MONGO_HOST=mongodb
      - MONGO_PORT=27017

  mongodb:
    image: mongo:4.4.3
    networks:
      - attendance-network
    ports:
      - "27017:27017"

networks:
  attendance-network:
    driver: bridge